name: Release BrowserOS Server

on:
  push:
    tags:
      - "agent-server/v*"
  workflow_call:
    inputs:
      version:
        description: "Release version (e.g. 0.0.123). If newer than package.json, the workflow applies it before building."
        required: false
        type: string
      apply_bump:
        description: "Patch-bump when no newer explicit version is provided; non-publishing callers commit it."
        required: false
        default: false
        type: boolean
      targets:
        description: "Server build targets to publish to R2"
        required: false
        default: all
        type: string
      publish_github_release:
        description: "Create or update the GitHub server release"
        required: false
        default: true
        type: boolean
    outputs:
      server_version:
        description: "The server version that was built and uploaded."
        value: ${{ jobs.release.outputs.server_version }}
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.0.123). If newer than package.json, the workflow commits it before building."
        required: true
        type: string
      apply_bump:
        description: "Patch-bump only when version matches package.json."
        required: false
        default: false
        type: boolean
      targets:
        description: "Server build targets to publish to R2"
        required: false
        default: all
        type: choice
        options:
          - all
          - darwin-arm64
          - darwin-x64
          - linux-arm64
          - linux-x64
          - windows-x64
      publish_github_release:
        description: "Create or update the GitHub server release"
        required: false
        default: true
        type: boolean

concurrency:
  group: release-server
  cancel-in-progress: false

jobs:
  authorize_manual_dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: release-core
    steps:
      - run: echo "Manual dispatch approved through release-core."

  release:
    needs: authorize_manual_dispatch
    if: |
      always() &&
      github.event.deleted != true &&
      (github.event_name != 'workflow_dispatch' || needs.authorize_manual_dispatch.result == 'success')
    runs-on: ubuntu-latest
    outputs:
      server_version: ${{ steps.version.outputs.package_version }}
    permissions:
      contents: write
      pull-requests: read
    timeout-minutes: 120
    defaults:
      run:
        working-directory: packages/browseros-agent

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.repository.default_branch || github.ref }}

      - name: Resolve release options
        id: options
        env:
          INPUT_APPLY_BUMP: ${{ inputs.apply_bump }}
          INPUT_PUBLISH_GITHUB_RELEASE: ${{ inputs.publish_github_release }}
          INPUT_TARGETS: ${{ inputs.targets }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          apply_bump="${INPUT_APPLY_BUMP:-false}"
          publish_github_release="${INPUT_PUBLISH_GITHUB_RELEASE:-true}"
          targets="${INPUT_TARGETS:-all}"

          {
            echo "apply_bump=$apply_bump"
            echo "publish_github_release=$publish_github_release"
            echo "targets=$targets"
            echo "version=$INPUT_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Validate release options
        env:
          SERVER_RELEASE_TARGETS: ${{ steps.options.outputs.targets }}
          PUBLISH_GITHUB_RELEASE: ${{ steps.options.outputs.publish_github_release }}
        run: |
          set -euo pipefail
          if [ "$PUBLISH_GITHUB_RELEASE" = "true" ] && [ "$SERVER_RELEASE_TARGETS" != "all" ]; then
            echo "::error::Set publish_github_release=false when releasing a subset of server targets."
            exit 1
          fi

      - name: Resolve server version
        id: version
        env:
          APPLY_BUMP: ${{ steps.options.outputs.apply_bump }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
          PUBLISH_GITHUB_RELEASE: ${{ steps.options.outputs.publish_github_release }}
          RELEASE_TAG: ${{ github.ref_name }}
          REQUESTED_VERSION: ${{ steps.options.outputs.version }}
        run: |
          set -euo pipefail

          release_output="$(
            ./scripts/release/resolve-server-release.sh \
              --event-name "$EVENT_NAME" \
              --default-branch "$DEFAULT_BRANCH" \
              --requested-version "$REQUESTED_VERSION" \
              --release-tag "$RELEASE_TAG" \
              --apply-bump "$APPLY_BUMP" \
              --publish-github-release "$PUBLISH_GITHUB_RELEASE"
          )"
          printf '%s\n' "$release_output"

          package_version="$(printf '%s\n' "$release_output" | awk -F= '$1 == "package_version" {print $2}' | tail -n 1)"
          release_tag="$(printf '%s\n' "$release_output" | awk -F= '$1 == "tag" {print $2}' | tail -n 1)"
          release_sha="$(printf '%s\n' "$release_output" | awk -F= '$1 == "release_sha" {print $2}' | tail -n 1)"

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          Server release flow:
          - Version: ${package_version}
          - Tag: ${release_tag}
          - Release commit: ${release_sha}
          - Publishing releases commit apps/server/package.json and bun.lock before building when the requested/tag version is newer.
          - Non-publishing calls keep the version update local so the caller can commit it.
          EOF

      - name: Checkout server release commit
        if: ${{ steps.options.outputs.publish_github_release == 'true' }}
        run: git checkout --detach "${{ steps.version.outputs.release_sha }}"
        working-directory: ${{ github.workspace }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        run: bun ci

      - name: Prepare production env file
        run: cp apps/claw-server/.env.example apps/claw-server/.env.production

      - name: Build and upload release artifacts
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_UPLOAD_PREFIX: claw-server/prod-resources
          NODE_ENV: production
          LOG_LEVEL: info
          FORCE_COLOR: 1
          SERVER_RELEASE_TARGETS: ${{ steps.options.outputs.targets }}
        run: bun scripts/build/claw-server.ts --target="$SERVER_RELEASE_TARGETS"

      - name: Verify release artifacts
        run: |
          mapfile -t ZIP_FILES < <(find dist/prod/claw-server -maxdepth 1 -type f -name 'browseros-claw-server-resources-*.zip' | sort)

          if [ "${#ZIP_FILES[@]}" -eq 0 ]; then
            echo "No Claw server release zip files were produced"
            exit 1
          fi

          printf 'Found release artifacts:\n%s\n' "${ZIP_FILES[@]}"

      - name: Generate release notes
        if: ${{ steps.options.outputs.publish_github_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
          RELEASE_SHA: ${{ steps.version.outputs.release_sha }}
        run: |
          set -euo pipefail
          SERVER_APP_PATH="packages/browseros-agent/apps/claw-server"
          SERVER_BUILD_DIR="packages/browseros-agent/scripts/build/claw-server"
          SERVER_BUILD_ENTRY="packages/browseros-agent/scripts/build/claw-server.ts"
          SERVER_RESOURCE_MANIFEST="packages/browseros-agent/scripts/build/config/claw-server-prod-resources.json"
          SERVER_VERSION_PKG="packages/browseros-agent/apps/server/package.json"
          SERVER_WORKSPACE_PKG="packages/browseros-agent/package.json"
          PREV_TAG="$PREVIOUS_TAG"

          if [ -z "$PREV_TAG" ]; then
            echo "Initial release of browseros-claw-server." > /tmp/release-notes.md
          else
            COMMITS=$(git log "$PREV_TAG..$RELEASE_SHA" --pretty=format:"%H" -- \
              "$SERVER_APP_PATH" \
              "$SERVER_BUILD_DIR" \
              "$SERVER_BUILD_ENTRY" \
              "$SERVER_RESOURCE_MANIFEST" \
              "$SERVER_VERSION_PKG" \
              "$SERVER_WORKSPACE_PKG")

            if [ -z "$COMMITS" ]; then
              echo "No notable changes." > /tmp/release-notes.md
            else
              echo "## What's Changed" > /tmp/release-notes.md
              echo "" >> /tmp/release-notes.md

              while IFS= read -r SHA; do
                SUBJECT=$(git log -1 --pretty=format:"%s" "$SHA")
                PR_NUM=$(gh api "/repos/${{ github.repository }}/commits/${SHA}/pulls" --jq '.[0].number // empty' 2>/dev/null)

                if [ -n "$PR_NUM" ] && ! echo "$SUBJECT" | grep -qF "(#${PR_NUM})"; then
                  echo "- ${SUBJECT} (#${PR_NUM})" >> /tmp/release-notes.md
                else
                  echo "- ${SUBJECT}" >> /tmp/release-notes.md
                fi
              done <<< "$COMMITS"
            fi
          fi
        working-directory: ${{ github.workspace }}

      - name: Create GitHub release
        if: ${{ steps.options.outputs.publish_github_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          TAG="$RELEASE_TAG"
          TITLE="BrowserOS Claw Server - v$PACKAGE_VERSION"
          mapfile -t ZIP_FILES < <(find packages/browseros-agent/dist/prod/claw-server -maxdepth 1 -type f -name 'browseros-claw-server-resources-*.zip' | sort)

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, updating"
            gh release edit "$TAG" --title "$TITLE" --notes-file /tmp/release-notes.md
            gh release upload "$TAG" "${ZIP_FILES[@]}" --clobber
          else
            gh release create "$TAG" \
              --verify-tag \
              --title "$TITLE" \
              --notes-file /tmp/release-notes.md \
              "${ZIP_FILES[@]}"
          fi
        working-directory: ${{ github.workspace }}
